name: tests

on:
  push:
    branches: [main]
    paths:
      - 'screenredact/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
  pull_request:
    paths:
      - 'screenredact/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Poetry
        # `python` here is the 3.13 installed by actions/setup-python above.
        # Using `pipx install poetry` instead picks up ubuntu-latest's system
        # Python (3.12.x), which makes Poetry itself run under 3.12 and trip
        # on the project's `requires-python = ">=3.13,<3.14"` constraint.
        run: python -m pip install poetry==2.1.3
      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
      - name: Install deps
        # Skip the `runtime` group: ocrmac/presidio are stubbed by
        # tests/conftest.py and `ocrmac` is macOS-only anyway, so it
        # can't resolve on the ubuntu-latest runner.
        run: poetry install --no-interaction --no-ansi --without runtime
      - name: Run tests
        run: poetry run pytest
