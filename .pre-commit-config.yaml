repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        types: [markdown]
      - id: end-of-file-fixer
        types: [markdown]
      - id: mixed-line-ending
        args: [--fix=lf]
        types: [markdown]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
